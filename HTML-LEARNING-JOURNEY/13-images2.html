<!DOCTYPE html>
<html>
    <head>
        <title>Additional attributes on images</title>
    </head>
    <body>
        <h2>Applying Image Border</h2>
        <img src="https://tse3.mm.bing.net/th/id/OIP.UWJPAyQ6TrV5jmDjefryOAHaEO?r=0&pid=Api&P=0&h=180" border="20">
        <h2>Image Alignment</h2>
        <h4 align="center">By using center tag</h4>
        <center><img src="https://tse2.mm.bing.net/th/id/OIP.ev3QhfCxNe68XNnyW-e0wAHaHa?r=0&pid=Api&P=0&h=180"</center>
        <h4 align="right">By using align attribute</h4>
        <img src="https://tse1.mm.bing.net/th/id/OIP.9fVmt5M77qfjHDfsX6hZVQHaEK?r=0&pid=Api&P=0&h=180" align="right">
    </body>
</html>
