<!DOCTYPE html>
<html>
    <head>
        <title>alignments of text in table</title>
    </head>
    <body>
        <table border="1" bordercolor="red" bgcolor="yellow" height="500" width="500">
            <thead>
                <th colspan="4" align="center">STUDENT & EMPLOYEE DATA LIST</th>
            </thead>
            <tr align="center" valign="top" bgcolor="crimson"><td colspan="2">STUDENT DATA</td><td colspan="2">EMPLOYEE DATA</td></tr>
            <tr><td>Name</td><td>Class</td><td>Name</td><td>Salary</td></tr>
            <tr><td>Ravi</td><td>IX</td><td>Srinivasa Rao</td><td rowspan="2">20,000</td></tr>
            <tr><td>Ganesh</td><td rowspan="2">VII</td><td>Rama Rao</td></tr>
            <tr><td>Vijay</td><td>Chalapathi Rao</td><td>18,500</td></tr>
        </table>
    </body>
</html>
